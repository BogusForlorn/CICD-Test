apiVersion: apps/v1
kind: Deployment
metadata:
  name: devsecops-aggregator
  namespace: {{ .Values.global.namespace }}
  labels:
    app: devsecops-aggregator
spec:
  replicas: {{ .Values.aggregator.replicaCount }}
  selector:
    matchLabels:
      app: devsecops-aggregator
  template:
    metadata:
      labels:
        app: devsecops-aggregator
    spec:
      containers:
        - name: aggregator
          image: "{{ .Values.aggregator.image.repository }}:{{ .Values.aggregator.image.tag }}"
          imagePullPolicy: {{ .Values.aggregator.image.pullPolicy }}
          ports:
            - containerPort: 8001
          env:
            - name: STORAGE_PROVIDER
              value: "{{ .Values.global.storageProvider }}"
            - name: DASHBOARD_URL
              value: "{{ .Values.global.dashboardUrl }}"
            - name: AI_PROVIDER
              value: '{{ .Values.aggregator.ai.provider | default "anthropic" }}'
            - name: AI_MODEL
              value: '{{ .Values.aggregator.ai.model | default "" }}'
            - name: AI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: devsecops-secrets
                  key: ai-api-key
                  optional: true
            - name: RESULTS_BUCKET
              valueFrom:
                secretKeyRef:
                  name: devsecops-secrets
                  key: results-bucket
                  optional: true
            - name: DEFECTDOJO_URL
              valueFrom:
                secretKeyRef:
                  name: devsecops-secrets
                  key: defectdojo-url
                  optional: true
            - name: DEFECTDOJO_TOKEN
              valueFrom:
                secretKeyRef:
                  name: devsecops-secrets
                  key: defectdojo-token
                  optional: true
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: devsecops-secrets
                  key: aws-access-key-id
                  optional: true
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: devsecops-secrets
                  key: aws-secret-access-key
                  optional: true
            - name: AZURE_STORAGE_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: devsecops-secrets
                  key: azure-storage-conn-string
                  optional: true
          resources: {{ .Values.aggregator.resources | toYaml | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: devsecops-aggregator
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: devsecops-aggregator
  ports:
    - port: 8001
      targetPort: 8001
  type: ClusterIP
