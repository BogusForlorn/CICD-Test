---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: devsecops-orchestrator
  namespace: {{ .Values.global.namespace }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: devsecops-scanner
  namespace: {{ .Values.global.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: devsecops-job-manager
  namespace: {{ .Values.global.namespace }}
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: devsecops-orchestrator-binding
  namespace: {{ .Values.global.namespace }}
subjects:
  - kind: ServiceAccount
    name: devsecops-orchestrator
    namespace: {{ .Values.global.namespace }}
roleRef:
  kind: Role
  name: devsecops-job-manager
  apiGroup: rbac.authorization.k8s.io
